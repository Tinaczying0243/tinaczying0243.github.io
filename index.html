<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Decode SPA redirect from 404.html query-string encoding
      // Runs before React boots — uses history.replaceState (no page reload)
      (function() {
        var search = window.location.search;
        if (search && search[1] === '/') {
          var decoded = search.slice(2).replace(/&/, '?');
          history.replaceState(null, '', '/' + decoded + window.location.hash);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tina Chen — Multimedia Journalist</title>
    <meta name="description" content="Portfolio of Tina Chen, multimedia journalist and data reporter at UC Berkeley Graduate School of Journalism. Business, tech, and local news reporting." />
    <meta property="og:title" content="Tina Chen — Multimedia Journalist" />
    <meta property="og:description" content="Business & tech reporter. Data journalist. UC Berkeley." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

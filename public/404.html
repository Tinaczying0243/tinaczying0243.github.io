<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tina Chen — Multimedia Journalist</title>
  <script>
    // SPA redirect for GitHub Pages — loop-safe canonical pattern
    // Encodes the path into a query string so GitHub Pages always serves index.html
    // e.g. /tina-chen-portfolio/articles/labubu → /tina-chen-portfolio/?/articles/labubu
    var repo = '/tina-chen-portfolio';
    var path = window.location.pathname.slice(repo.length) || '/';
    var search = window.location.search;
    var hash = window.location.hash;
    if (path !== '/') {
      window.location.replace(
        repo + '/?/' + path.replace(/^\//, '') + (search ? '&' + search.slice(1) : '') + hash
      );
    }
  </script>
</head>
<body></body>
</html>

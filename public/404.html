<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tina Chen — Multimedia Journalist</title>
  <script>
    // SPA redirect for GitHub Pages (loop-safe)
    // Encodes the path into a query string so the root index.html is always served.
    // history.replaceState in index.html silently restores the real URL before React boots.
    var l = window.location;
    var segmentCount = 0;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
